# Optional, off-by-default tracing backend.
#
# Enable by adding this fragment to the compose invocation, e.g.:
#   docker compose -f compose.yml -f compose.tls.yml -f compose.tempo.yml up -d
#
# It runs a single monolithic Grafana Tempo container, wires the server to export traces to
# it over OTLP (metrics stay off -- Tempo is traces-only), and persists blocks to the small
# `tempo-data` volume. Tempo publishes no host ports; it is reachable only on the compose
# network. Its query API is exposed for a remote Grafana through the frontend nginx. This
# fragment mounts deploy/nginx/tempo-location.inc, which adds a /tempo/ route behind a
# dedicated Tempo-only Basic-auth realm. Those credentials are unrelated to Bunnyland users
# and bearer tokens. Restart the frontend after recreating Tempo so nginx picks up its new IP.
services:
  server:
    environment:
      BUNNYLAND_OTEL_ENABLED: "1"
      OTEL_SERVICE_NAME: bunnyland
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
    depends_on:
      - tempo

  frontend:
    depends_on:
      - tempo
    volumes:
      - ./deploy/nginx/tempo-location.inc:/etc/nginx/templates/tempo-location.inc.template:ro

  tempo:
    image: grafana/tempo:${BUNNYLAND_TEMPO_TAG:-2.7.1}
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./deploy/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    expose:
      - "3200"
      - "4317"
    restart: unless-stopped

volumes:
  tempo-data:
