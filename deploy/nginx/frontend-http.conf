map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name ${BUNNYLAND_SERVER_NAME};
    resolver ${NGINX_LOCAL_RESOLVERS} valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location = /config.json {
        alias /usr/share/nginx/config/config.json;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/admin/ {
        auth_basic "Bunnyland world editor";
        auth_basic_user_file /etc/nginx/bunnyland/world-editor.htpasswd;

        set $api_upstream ${BUNNYLAND_API_UPSTREAM};
        rewrite ^/api(/admin/.*)$ $1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/mcp {
        auth_basic "Bunnyland MCP";
        auth_basic_user_file /etc/nginx/bunnyland/world-editor.htpasswd;

        set $api_upstream ${BUNNYLAND_API_UPSTREAM};
        rewrite ^/api(/mcp)$ $1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host 127.0.0.1:8765;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /api/mcp/ {
        auth_basic "Bunnyland MCP";
        auth_basic_user_file /etc/nginx/bunnyland/world-editor.htpasswd;

        set $api_upstream ${BUNNYLAND_API_UPSTREAM};
        rewrite ^/api(/mcp/.*)$ $1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host 127.0.0.1:8765;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        set $api_upstream ${BUNNYLAND_API_UPSTREAM};
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }
}
