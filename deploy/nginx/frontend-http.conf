map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=bunnyland_api:10m rate=${BUNNYLAND_EDGE_API_RATE};

server {
    listen 80;
    server_name ${BUNNYLAND_SERVER_NAME};

    root /usr/share/nginx/html;
    index index.html;

    location = /config.json {
        alias /usr/share/nginx/config/config.json;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    include /etc/nginx/conf.d/api-locations.inc;
}
