services:
  server:
    command:
      - /bin/sh
      - -ec
      - |
        set -- bunnyland serve
        llm_provider="$${BUNNYLAND_LLM_PROVIDER:-ollama}"
        worldgen_provider="$${BUNNYLAND_WORLDGEN_PROVIDER:-$$llm_provider}"
        if [ "$${BUNNYLAND_ENABLE_LLM:-0}" = "1" ]; then
          set -- "$$@" --llm --llm-provider "$$llm_provider" --worldgen-provider "$$worldgen_provider" --worldgen-model "$${BUNNYLAND_WORLDGEN_MODEL:-deepseek-v4-pro}" --character-model "$${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}"
        elif [ "$${BUNNYLAND_ENABLE_CHARACTER_CHAT:-0}" = "1" ]; then
          set -- "$$@" --llm-provider "$$llm_provider" --character-model "$${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}"
        fi
        if [ "$${BUNNYLAND_ENABLE_DISCORD:-0}" = "1" ]; then
          set -- "$$@" --discord
        fi
        if [ "$${BUNNYLAND_ENABLE_MCP:-0}" = "1" ]; then
          set -- "$$@" --mcp
        fi
        if [ "$${BUNNYLAND_ENABLE_CHARACTER_CHAT:-0}" = "1" ]; then
          set -- "$$@" --character-chat
        fi
        exec "$$@" \
          --load "$${BUNNYLAND_WORLD_FILE:-/data/worlds/main.json}" \
          --ticks 0 \
          --tick-seconds "$${BUNNYLAND_TICK_SECONDS:-30}" \
          --time-scale "$${BUNNYLAND_TIME_SCALE:-1800}" \
          --api-host 0.0.0.0 \
          --api-port 8765 \
          --save "$${BUNNYLAND_WORLD_FILE:-/data/worlds/main.json}" \
          --autosave-every "$${BUNNYLAND_AUTOSAVE_EVERY:-20}"
