name: bunnyland

services:
  server:
    image: ghcr.io/thalismind/bunnyland-server:${BUNNYLAND_SERVER_TAG:-main}
    command:
      - /bin/sh
      - -ec
      - |
        set -- bunnyland serve
        if [ "$${BUNNYLAND_ENABLE_LLM:-0}" = "1" ]; then
          set -- "$$@" --llm --worldgen-model "$${BUNNYLAND_WORLDGEN_MODEL:-deepseek-v4-pro}" --character-model "$${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}"
        fi
        if [ "$${BUNNYLAND_ENABLE_DISCORD:-0}" = "1" ]; then
          set -- "$$@" --discord
        fi
        exec "$$@" \
          --generator "$${BUNNYLAND_GENERATOR:-lifesim-demo}" \
          --ticks 0 \
          --tick-seconds "$${BUNNYLAND_TICK_SECONDS:-30}" \
          --time-scale "$${BUNNYLAND_TIME_SCALE:-1800}" \
          --api-host 0.0.0.0 \
          --api-port 8765 \
          --save /data/worlds/main.json \
          --autosave-every "$${BUNNYLAND_AUTOSAVE_EVERY:-20}"
    volumes:
      - ${BUNNYLAND_DATA_DIR:-./data}:/data
    environment:
      BUNNYLAND_GENERATOR: ${BUNNYLAND_GENERATOR:-lifesim-demo}
      BUNNYLAND_WORLD_FILE: ${BUNNYLAND_WORLD_FILE:-/data/worlds/main.json}
      BUNNYLAND_TICK_SECONDS: ${BUNNYLAND_TICK_SECONDS:-30}
      BUNNYLAND_TIME_SCALE: ${BUNNYLAND_TIME_SCALE:-1800}
      BUNNYLAND_AUTOSAVE_EVERY: ${BUNNYLAND_AUTOSAVE_EVERY:-20}
    expose:
      - "8765"
    restart: unless-stopped

  frontend:
    image: ghcr.io/thalismind/bunnyland-web:${BUNNYLAND_WEB_TAG:-main}
    depends_on:
      - server
    environment:
      BUNNYLAND_API_UPSTREAM: http://server:8765
      BUNNYLAND_SERVER_NAME: ${BUNNYLAND_SERVER_NAME:-_}
    expose:
      - "80"
    restart: unless-stopped
