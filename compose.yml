name: bunnyland

services:
  server:
    image: ghcr.io/thalismind/bunnyland-server:${BUNNYLAND_SERVER_TAG:-main}
    command:
      - /bin/sh
      - -ec
      - |
        set -- bunnyland serve
        llm_provider="$${BUNNYLAND_LLM_PROVIDER:-ollama}"
        worldgen_provider="$${BUNNYLAND_WORLDGEN_PROVIDER:-$$llm_provider}"
        memory_backend="$${BUNNYLAND_MEMORY_BACKEND:-in-memory}"
        if [ "$${BUNNYLAND_ENABLE_LLM:-0}" = "1" ]; then
          set -- "$$@" --llm --llm-provider "$$llm_provider" --worldgen-provider "$$worldgen_provider" --worldgen-model "$${BUNNYLAND_WORLDGEN_MODEL:-deepseek-v4-pro}" --character-model "$${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}"
        elif [ "$${BUNNYLAND_ENABLE_CHARACTER_CHAT:-0}" = "1" ]; then
          set -- "$$@" --llm-provider "$$llm_provider" --character-model "$${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}"
        fi
        if [ "$${BUNNYLAND_ENABLE_DISCORD:-0}" = "1" ]; then
          set -- "$$@" --discord
        fi
        if [ "$${BUNNYLAND_ENABLE_MCP:-0}" = "1" ]; then
          set -- "$$@" --mcp
        fi
        if [ "$${BUNNYLAND_ENABLE_CHARACTER_CHAT:-0}" = "1" ]; then
          set -- "$$@" --character-chat
        fi
        if [ -n "$${BUNNYLAND_STARTER_PACK:-}" ]; then
          set -- "$$@" --starter-pack "$${BUNNYLAND_STARTER_PACK}"
        fi
        set -- "$$@" --memory-backend "$$memory_backend"
        if [ -n "$${BUNNYLAND_MEMORY_PATH:-}" ]; then
          set -- "$$@" --memory-path "$${BUNNYLAND_MEMORY_PATH}"
        fi
        exec "$$@" \
          --generator "$${BUNNYLAND_GENERATOR:-lifesim-demo}" \
          --ticks 0 \
          --tick-seconds "$${BUNNYLAND_TICK_SECONDS:-30}" \
          --time-scale "$${BUNNYLAND_TIME_SCALE:-1800}" \
          --api-host 0.0.0.0 \
          --api-port 8765 \
          --save /data/worlds/main.json \
          --autosave-every "$${BUNNYLAND_AUTOSAVE_EVERY:-20}"
    volumes:
      - ${BUNNYLAND_DATA_DIR:-./data}:/data
    environment:
      BUNNYLAND_GENERATOR: ${BUNNYLAND_GENERATOR:-lifesim-demo}
      BUNNYLAND_STARTER_PACK: ${BUNNYLAND_STARTER_PACK:-}
      BUNNYLAND_WORLD_FILE: ${BUNNYLAND_WORLD_FILE:-/data/worlds/main.json}
      BUNNYLAND_TICK_SECONDS: ${BUNNYLAND_TICK_SECONDS:-30}
      BUNNYLAND_TIME_SCALE: ${BUNNYLAND_TIME_SCALE:-1800}
      BUNNYLAND_AUTOSAVE_EVERY: ${BUNNYLAND_AUTOSAVE_EVERY:-20}
      BUNNYLAND_MEMORY_BACKEND: ${BUNNYLAND_MEMORY_BACKEND:-in-memory}
      BUNNYLAND_MEMORY_PATH: ${BUNNYLAND_MEMORY_PATH:-}
      BUNNYLAND_ENABLE_LLM: ${BUNNYLAND_ENABLE_LLM:-0}
      BUNNYLAND_LLM_PROVIDER: ${BUNNYLAND_LLM_PROVIDER:-ollama}
      BUNNYLAND_WORLDGEN_PROVIDER: ${BUNNYLAND_WORLDGEN_PROVIDER:-}
      BUNNYLAND_WORLDGEN_MODEL: ${BUNNYLAND_WORLDGEN_MODEL:-deepseek-v4-pro}
      BUNNYLAND_CHARACTER_MODEL: ${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}
      BUNNYLAND_ENABLE_DISCORD: ${BUNNYLAND_ENABLE_DISCORD:-0}
      BUNNYLAND_ENABLE_MCP: ${BUNNYLAND_ENABLE_MCP:-0}
      BUNNYLAND_ENABLE_CHARACTER_CHAT: ${BUNNYLAND_ENABLE_CHARACTER_CHAT:-0}
      BUNNYLAND_AUTH_USERS_FILE: ${BUNNYLAND_AUTH_USERS_FILE:-/run/secrets/bunnyland-users.yml}
      BUNNYLAND_TOKEN_DB: ${BUNNYLAND_TOKEN_DB:-/data/auth-tokens.sqlite3}
      BUNNYLAND_PLAYER_CLIENT_IDS: ${BUNNYLAND_PLAYER_CLIENT_IDS:-}
      BUNNYLAND_ADMIN_CLIENT_IDS: ${BUNNYLAND_ADMIN_CLIENT_IDS:-}
      BUNNYLAND_HTTP_RATE_LIMIT_REQUESTS: ${BUNNYLAND_HTTP_RATE_LIMIT_REQUESTS:-120}
      BUNNYLAND_HTTP_RATE_LIMIT_WINDOW_SECONDS: ${BUNNYLAND_HTTP_RATE_LIMIT_WINDOW_SECONDS:-1}
      BUNNYLAND_TRUST_X_REAL_IP: ${BUNNYLAND_TRUST_X_REAL_IP:-1}
      BUNNYLAND_DISCORD_COOLDOWN_SECONDS: ${BUNNYLAND_DISCORD_COOLDOWN_SECONDS:-1}
    expose:
      - "8765"
    restart: unless-stopped

  frontend:
    image: ghcr.io/thalismind/bunnyland-web:${BUNNYLAND_WEB_TAG:-main}
    depends_on:
      - server
    environment:
      BUNNYLAND_API_UPSTREAM: http://server:8765
      BUNNYLAND_SERVER_NAME: ${BUNNYLAND_SERVER_NAME:-_}
      BUNNYLAND_DISCORD_URL: ${BUNNYLAND_DISCORD_URL:-}
      BUNNYLAND_WEB_THEME: ${BUNNYLAND_WEB_THEME:-}
      BUNNYLAND_WEB_THEMES: ${BUNNYLAND_WEB_THEMES:-[]}
      BUNNYLAND_EDGE_API_RATE: ${BUNNYLAND_EDGE_API_RATE:-30r/s}
      BUNNYLAND_EDGE_API_BURST: ${BUNNYLAND_EDGE_API_BURST:-60}
      BUNNYLAND_EDGE_RETRY_AFTER: ${BUNNYLAND_EDGE_RETRY_AFTER:-1}
    expose:
      - "80"
    restart: unless-stopped
