name: bunnyland

services:
  server:
    image: ghcr.io/thalismind/bunnyland-server:${BUNNYLAND_SERVER_TAG:-main}
    command:
      - bunnyland
      - serve
      - --llm
      - --discord
      - --generator
      - ${BUNNYLAND_GENERATOR:-lifesim-demo}
      - --worldgen-model
      - ${BUNNYLAND_WORLDGEN_MODEL:-deepseek-v4-pro}
      - --character-model
      - ${BUNNYLAND_CHARACTER_MODEL:-deepseek-v4-flash}
      - --ticks
      - "0"
      - --tick-seconds
      - ${BUNNYLAND_TICK_SECONDS:-30}
      - --time-scale
      - ${BUNNYLAND_TIME_SCALE:-1800}
      - --api-host
      - 0.0.0.0
      - --api-port
      - "8765"
      - --save
      - /data/worlds/main.json
      - --autosave-every
      - ${BUNNYLAND_AUTOSAVE_EVERY:-20}
    volumes:
      - ${BUNNYLAND_DATA_DIR:-./data}:/data
    environment:
      OLLAMA_CLOUD_API_KEY: ${OLLAMA_CLOUD_API_KEY:?set OLLAMA_CLOUD_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST:-https://ollama.com}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN}
      BUNNYLAND_DISCORD_USER_ID: ${BUNNYLAND_DISCORD_USER_ID:-}
      BUNNYLAND_DISCORD_CHANNEL_ID: ${BUNNYLAND_DISCORD_CHANNEL_ID:-}
      BUNNYLAND_DISCORD_CHARACTER: ${BUNNYLAND_DISCORD_CHARACTER:-}
    expose:
      - "8765"
    restart: unless-stopped

  frontend:
    image: ghcr.io/thalismind/bunnyland-web:${BUNNYLAND_WEB_TAG:-main}
    depends_on:
      - server
    environment:
      BUNNYLAND_API_UPSTREAM: http://server:8765
      BUNNYLAND_SERVER_NAME: ${BUNNYLAND_SERVER_NAME:-_}
    ports:
      - "${BUNNYLAND_HTTP_BIND:-0.0.0.0:80}:80"
    restart: unless-stopped
