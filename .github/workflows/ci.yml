name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest

      - name: E2E and playtests
        run: uv run pytest tests/test_e2e.py tests/test_discord_playtest.py

  container:
    name: Build container
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bunnyland-server
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  vps-setup:
    name: VPS Docker setup smoke test
    runs-on: ubuntu-latest
    needs:
      - container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Docker availability
        run: |
          docker version
          docker compose version
          sudo docker version
          sudo docker compose version

      - name: Validate wizard-rendered Compose config
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
          BUNNYLAND_SETUP_DRY_RUN: "1"
          BUNNYLAND_TLS: "0"
          BUNNYLAND_CONFIGURE_FIREWALL: "0"
          BUNNYLAND_HTTP_BIND: 127.0.0.1:18080
          BUNNYLAND_DOMAIN: localhost
          BUNNYLAND_DATA_DIR: ${{ runner.temp }}/bunnyland-vps-data-dry-run
          BUNNYLAND_NGINX_AUTH_DIR: ${{ runner.temp }}/bunnyland-vps-auth-dry-run
          BUNNYLAND_ADMIN_USER: editor
          BUNNYLAND_ADMIN_PASSWORD: local
          BUNNYLAND_SERVER_TAG: main
          BUNNYLAND_ENABLE_LLM: "0"
          BUNNYLAND_ENABLE_DISCORD: "0"
        run: |
          printf '\nlocalhost\n%s\neditor\nlocal\nlocal\n\n\n\n\nn\n\n' "$BUNNYLAND_DATA_DIR" \
            | scripts/vps-docker-wizard

      - name: Run setup script
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
          BUNNYLAND_TLS: "0"
          BUNNYLAND_CONFIGURE_FIREWALL: "0"
          BUNNYLAND_HTTP_BIND: 127.0.0.1:18080
          BUNNYLAND_DOMAIN: localhost
          BUNNYLAND_DATA_DIR: ${{ runner.temp }}/bunnyland-vps-data
          BUNNYLAND_NGINX_AUTH_DIR: ${{ runner.temp }}/bunnyland-vps-auth
          BUNNYLAND_ADMIN_USER: editor
          BUNNYLAND_ADMIN_PASSWORD: local
          BUNNYLAND_SERVER_TAG: main
          BUNNYLAND_ENABLE_LLM: "0"
          BUNNYLAND_ENABLE_DISCORD: "0"
        run: scripts/vps-docker-setup

      - name: Restart local deployment
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
        run: scripts/vps-docker-restart

      - name: Verify local deployment
        env:
          BUNNYLAND_VERIFY_SCHEME: http
          BUNNYLAND_VERIFY_CONNECT_HOST: 127.0.0.1
          BUNNYLAND_VERIFY_PORT: "18080"
          BUNNYLAND_DOMAIN: localhost
          BUNNYLAND_ADMIN_USER: editor
          BUNNYLAND_ADMIN_PASSWORD: local
        run: |
          for attempt in {1..24}; do
            if curl -fsS -H 'Host: localhost' http://127.0.0.1:18080/api/health >/dev/null; then
              break
            fi
            sleep 5
          done
          scripts/vps-docker-verify

      - name: Clean up local deployment
        if: always()
        run: |
          sudo docker compose --env-file /dev/null -p bunnyland -f compose.yml -f compose.user.yml down -v --remove-orphans || true
          sudo rm -rf "${{ runner.temp }}/bunnyland-vps-data" "${{ runner.temp }}/bunnyland-vps-data-dry-run"
          sudo rm -rf "${{ runner.temp }}/bunnyland-vps-auth" "${{ runner.temp }}/bunnyland-vps-auth-dry-run"
