name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test with coverage
        env:
          BUNNYLAND_PLAYTEST_TRACE_DIR: artifacts/playtests
        run: scripts/test-coverage

      - name: Upload playtest traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discord-playtest-traces
          path: artifacts/playtests
          if-no-files-found: error

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            artifacts/coverage/pytest.xml
            coverage.xml
            htmlcov
          if-no-files-found: error

  container:
    name: Build container
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract server container metadata
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bunnyland-server
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract TUI container metadata
        id: tui-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bunnyland-tui
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract REPL container metadata
        id: repl-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bunnyland-repl
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish base server container
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BUNNYLAND_GIT_HASH=${{ github.sha }}
          target: server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=bunnyland-server
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:latest
          cache-to: |
            type=gha,scope=bunnyland-server,mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache,mode=max,ignore-error=true

      - name: Build and publish TUI container
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BUNNYLAND_GIT_HASH=${{ github.sha }}
          target: tui
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tui-meta.outputs.tags }}
          labels: ${{ steps.tui-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=bunnyland-server
            type=gha,scope=bunnyland-tui
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:latest
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-tui:buildcache
          cache-to: |
            type=gha,scope=bunnyland-tui,mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-tui:buildcache,mode=max,ignore-error=true

      - name: Build and publish REPL container
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            BUNNYLAND_GIT_HASH=${{ github.sha }}
          target: repl
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.repl-meta.outputs.tags }}
          labels: ${{ steps.repl-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=bunnyland-server
            type=gha,scope=bunnyland-repl
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:latest
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-repl:buildcache
          cache-to: |
            type=gha,scope=bunnyland-repl,mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-repl:buildcache,mode=max,ignore-error=true

  vps-setup:
    name: VPS Docker setup smoke test
    runs-on: ubuntu-latest
    needs:
      - container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Docker availability
        run: |
          docker version
          docker compose version
          sudo docker version
          sudo docker compose version

      - name: Validate wizard-rendered Compose config
        env:
          BUNNYLAND_SETUP_DRY_RUN: "1"
          BUNNYLAND_TLS: "0"
          BUNNYLAND_CONFIGURE_FIREWALL: "0"
          BUNNYLAND_HTTP_BIND: 127.0.0.1:18080
          BUNNYLAND_NGINX_AUTH_DIR: ${{ runner.temp }}/bunnyland-vps-auth-dry-run
          BUNNYLAND_SERVER_TAG: main
        run: |
          data_dir="${{ runner.temp }}/bunnyland-vps-data-dry-run"
          favicon_file="${{ runner.temp }}/bunnyland-favicon-dry-run.png"
          printf 'favicon\n' > "$favicon_file"
          # One answer per wizard prompt, in order; keep this list aligned with the prompts
          # in scripts/vps-docker-wizard.
          answers=(
            ""                            # container runtime (blank = first available)
            "localhost"                   # sandbox domain
            "$data_dir"                   # host data directory
            "editor"                      # admin username
            "local"                       # admin password
            "local"                       # admin password (confirm)
            ""                            # Let's Encrypt email (blank)
            ""                            # existing world save (blank)
            "none"                        # starter pack
            "y"                           # use a custom favicon?
            "$favicon_file"               # custom favicon path
            "https://discord.gg/example"  # community Discord invite URL
            ""                            # homepage domain (blank to skip)
            "n"                           # full deployment with LLM + Discord?
            "n"                           # enable HTTP MCP endpoint?
            "y"                           # proceed?
          )
          printf '%s\n' "${answers[@]}" | scripts/vps-docker-wizard

      - name: Run setup script
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
          BUNNYLAND_TLS: "0"
          BUNNYLAND_CONFIGURE_FIREWALL: "0"
          BUNNYLAND_HTTP_BIND: 127.0.0.1:18080
          BUNNYLAND_DOMAIN: localhost
          BUNNYLAND_DATA_DIR: ${{ runner.temp }}/bunnyland-vps-data
          BUNNYLAND_NGINX_AUTH_DIR: ${{ runner.temp }}/bunnyland-vps-auth
          BUNNYLAND_ADMIN_USER: editor
          BUNNYLAND_ADMIN_PASSWORD: local
          BUNNYLAND_SERVER_TAG: main
          BUNNYLAND_ENABLE_LLM: "0"
          BUNNYLAND_ENABLE_DISCORD: "0"
          # Enable MCP with a throwaway token so nginx injects it and the smoke test can
          # exercise the authenticated snapshot/stream, not just the unauthenticated gates.
          BUNNYLAND_ENABLE_MCP: "1"
          BUNNYLAND_ADMIN_TOKEN: ci-smoke-admin-token
          BUNNYLAND_FAVICON_FILE: ${{ runner.temp }}/bunnyland-favicon.png
        run: |
          printf 'favicon\n' > "$BUNNYLAND_FAVICON_FILE"
          scripts/vps-docker-setup

      - name: Restart local deployment
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
        run: scripts/vps-docker-restart

      - name: Verify local deployment
        env:
          BUNNYLAND_VERIFY_SCHEME: http
          BUNNYLAND_VERIFY_CONNECT_HOST: 127.0.0.1
          BUNNYLAND_VERIFY_PORT: "18080"
          BUNNYLAND_DOMAIN: localhost
          BUNNYLAND_ADMIN_USER: editor
          BUNNYLAND_ADMIN_PASSWORD: local
          # A token was configured above, so assert the authenticated snapshot/stream too.
          BUNNYLAND_VERIFY_ADMIN_DATA: "1"
        run: |
          for attempt in {1..24}; do
            if curl -fsS -H 'Host: localhost' http://127.0.0.1:18080/api/health >/dev/null; then
              break
            fi
            sleep 5
          done
          scripts/vps-docker-verify

      - name: Clean up local deployment
        if: always()
        run: |
          sudo docker compose --env-file /dev/null -p bunnyland -f compose.yml -f compose.user.yml down -v --remove-orphans || true
          sudo rm -rf "${{ runner.temp }}/bunnyland-vps-data" "${{ runner.temp }}/bunnyland-vps-data-dry-run"
          sudo rm -rf "${{ runner.temp }}/bunnyland-vps-auth" "${{ runner.temp }}/bunnyland-vps-auth-dry-run"
          sudo rm -f "${{ runner.temp }}/bunnyland-favicon.png" "${{ runner.temp }}/bunnyland-favicon-dry-run.png"
