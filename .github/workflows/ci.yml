name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Audit installed dependencies
        if: matrix.python-version == '3.12'
        run: uv run --with pip-audit pip-audit --local

      - name: Lint
        if: matrix.python-version == '3.12'
        run: uv run ruff check src tests

      - name: Test with coverage
        env:
          BUNNYLAND_PLAYTEST_TRACE_DIR: artifacts/playtests
        run: scripts/test-coverage

      - name: Check bounded world operations across CI-sized worlds
        if: matrix.python-version == '3.12'
        run: scripts/test-performance

      - name: Publish test and coverage summary
        if: always()
        run: python3 scripts/ci_report.py

      - name: Upload playtest traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: discord-playtest-traces-python-${{ matrix.python-version }}
          path: artifacts/playtests
          if-no-files-found: error

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-python-${{ matrix.python-version }}
          path: |
            artifacts/coverage/pytest.xml
            coverage.xml
            htmlcov
          if-no-files-found: error

      - name: Upload performance smoke report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: performance-smoke
          path: artifacts/performance/smoke
          if-no-files-found: error

  package:
    name: Build and validate Python distributions
    runs-on: ubuntu-latest
    needs: test
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build wheel and source distribution
        run: uv build --wheel --sdist --out-dir dist

      - name: Validate distribution metadata
        run: uvx twine check dist/*.whl dist/*.tar.gz

      - name: Smoke test the installed wheel
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          test -n "$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          uv venv "${{ runner.temp }}/wheel-smoke"
          uv pip install --python "${{ runner.temp }}/wheel-smoke/bin/python" \
            "${wheel}[chroma,discord,imagegen,llm,mcp,otel,repl,server,tui]"
          "${{ runner.temp }}/wheel-smoke/bin/python" -c \
            'from importlib.metadata import version; from importlib.resources import files; import bunnyland; from bunnyland.plugins import discover_plugins; assert bunnyland.__version__ == version("bunnyland"); assert files("bunnyland").joinpath("py.typed").is_file(); assert discover_plugins()'
          "${{ runner.temp }}/wheel-smoke/bin/bunnyland" --help
          "${{ runner.temp }}/wheel-smoke/bin/bunnyland" tui --help
          "${{ runner.temp }}/wheel-smoke/bin/bunnyland" repl --help
          "${{ runner.temp }}/wheel-smoke/bin/python" scripts/verify-migration-corpus.py

      - name: Smoke test the installed source distribution
        run: |
          sdist="$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$sdist"
          uv venv "${{ runner.temp }}/sdist-smoke"
          uv pip install --python "${{ runner.temp }}/sdist-smoke/bin/python" "$sdist"
          "${{ runner.temp }}/sdist-smoke/bin/python" -c \
            'from importlib.metadata import version; import bunnyland; assert bunnyland.__version__ == version("bunnyland")'
          "${{ runner.temp }}/sdist-smoke/bin/bunnyland" --help
          "${{ runner.temp }}/sdist-smoke/bin/python" scripts/verify-migration-corpus.py

      - name: Generate reproducible CycloneDX SBOM
        run: |
          uvx --from cyclonedx-bom cyclonedx-py environment \
            "${{ runner.temp }}/wheel-smoke" \
            --output-format JSON \
            --output-file dist/bunnyland.cdx.json \
            --output-reproducible
          serial="urn:uuid:${GITHUB_SHA:0:8}-${GITHUB_SHA:8:4}-5${GITHUB_SHA:13:3}-8${GITHUB_SHA:17:3}-${GITHUB_SHA:20:12}"
          jq --arg serial "$serial" \
            '.serialNumber = $serial' \
            dist/bunnyland.cdx.json > dist/bunnyland.cdx.tmp.json
          mv dist/bunnyland.cdx.tmp.json dist/bunnyland.cdx.json

      - name: Record distribution hashes
        run: |
          cd dist
          sha256sum *.whl *.tar.gz bunnyland.cdx.json > SHA256SUMS
          test -s SHA256SUMS

      - name: Attest distribution provenance
        if: github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Attest wheel SBOM
        if: github.event_name == 'push'
        uses: actions/attest@v4
        with:
          subject-path: dist/*.whl
          sbom-path: dist/bunnyland.cdx.json

      - name: Upload Python distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/
          retention-days: 14
          if-no-files-found: error

  publish-pypi:
    name: Publish signed release to PyPI
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out signed release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify annotated tag signature and package version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.type')"
          object_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" --jq '.object.sha')"
          test "$object_type" = "tag"
          verified="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}" --jq '.verification.verified')"
          test "$verified" = "true"
          package_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v${package_version}"

      - name: Download exact validated distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions-${{ github.sha }}
          path: dist

      - name: Verify distribution hashes
        run: cd dist && sha256sum -c SHA256SUMS

      - name: Select publishable distributions
        run: |
          mkdir publish
          cp dist/*.whl dist/*.tar.gz publish/

      - name: Publish with Trusted Publishing and PyPI attestations
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: publish/
          attestations: true

  container:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - test
      - package

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: server-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/bunnyland-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish Bunnyland container
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            BUNNYLAND_GIT_HASH=${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=bunnyland-server
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:latest
          cache-to: |
            type=gha,scope=bunnyland-server,mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache,mode=max,ignore-error=true

  vps-setup:
    name: VPS Docker setup smoke test
    runs-on: ubuntu-latest
    needs:
      - container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Check Docker availability
        run: |
          docker version
          docker compose version
          sudo docker version
          sudo docker compose version

      - name: Run exact-container auth smoke
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
          BUNNYLAND_SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
        run: scripts/container-auth-smoke
