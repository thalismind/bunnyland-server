name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Test with coverage
        env:
          BUNNYLAND_PLAYTEST_TRACE_DIR: artifacts/playtests
        run: scripts/test-coverage

      - name: Check bounded world operations across CI-sized worlds
        run: scripts/test-performance

      - name: Publish test and coverage summary
        if: always()
        run: python3 scripts/ci_report.py

      - name: Upload playtest traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: discord-playtest-traces
          path: artifacts/playtests
          if-no-files-found: error

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            artifacts/coverage/pytest.xml
            coverage.xml
            htmlcov
          if-no-files-found: error

      - name: Upload performance smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-smoke
          path: artifacts/performance/smoke
          if-no-files-found: error

  package:
    name: Build and validate Python distributions
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel and source distribution
        run: uv build --wheel --sdist --out-dir dist

      - name: Validate distribution metadata
        run: uvx twine check dist/*.whl dist/*.tar.gz

      - name: Smoke test the installed wheel
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          test -n "$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          uv venv "${{ runner.temp }}/wheel-smoke"
          uv pip install --python "${{ runner.temp }}/wheel-smoke/bin/python" \
            "${wheel}[chroma,discord,imagegen,llm,mcp,otel,repl,server,tui]"
          "${{ runner.temp }}/wheel-smoke/bin/python" -c \
            'import bunnyland; from bunnyland.plugins import discover_plugins; assert discover_plugins()'
          "${{ runner.temp }}/wheel-smoke/bin/bunnyland" --help
          "${{ runner.temp }}/wheel-smoke/bin/bunnyland" tui --help
          "${{ runner.temp }}/wheel-smoke/bin/bunnyland" repl --help

      - name: Record distribution hashes
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          test -s SHA256SUMS

      - name: Upload Python distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/
          retention-days: 14
          if-no-files-found: error

  # To activate publication later: enable a tag/release trigger, replace this false
  # condition with a signed v* tag/release condition, and configure the PyPI Trusted
  # Publisher for this repository and environment. No API token is required.
  publish-pypi:
    name: Publish to PyPI (disabled)
    runs-on: ubuntu-latest
    needs: package
    if: ${{ false }}
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Download exact validated distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions-${{ github.sha }}
          path: dist

      - name: Verify distribution hashes
        run: cd dist && sha256sum -c SHA256SUMS

      - name: Publish with Trusted Publishing
        run: uv publish --trusted-publishing always dist/*.whl dist/*.tar.gz

  container:
    name: Build container
    runs-on: ubuntu-latest
    needs:
      - test
      - package

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: server-meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/bunnyland-server
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish Bunnyland container
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            BUNNYLAND_GIT_HASH=${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          cache-from: |
            type=gha,scope=bunnyland-server
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:latest
          cache-to: |
            type=gha,scope=bunnyland-server,mode=max
            type=registry,ref=ghcr.io/${{ github.repository_owner }}/bunnyland-server:buildcache,mode=max,ignore-error=true

  vps-setup:
    name: VPS Docker setup smoke test
    runs-on: ubuntu-latest
    needs:
      - container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Docker availability
        run: |
          docker version
          docker compose version
          sudo docker version
          sudo docker compose version

      - name: Run exact-container auth smoke
        env:
          BUNNYLAND_CONTAINER_RUNTIME: docker
          BUNNYLAND_SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/bunnyland-server:main
        run: scripts/container-auth-smoke
