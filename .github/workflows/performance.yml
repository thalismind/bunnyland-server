name: World Performance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  world-scale:
    name: Million-entity world matrix
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run full world-size matrix
        run: scripts/benchmark-world full --fail-on-regression

      - name: Profile known scaling paths
        if: always()
        run: |
          for operation in idle_tick bounded_graph_query mutation_component_high_degree serialize_world; do
            scripts/benchmark-world profile \
              --entities 100000 \
              --edges 100000 \
              --topology concentrated \
              --operation "$operation" \
              --output artifacts/performance/profiles
          done

      - name: Upload measurements and profiles
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: world-performance-${{ github.sha }}
          path: artifacts/performance
          if-no-files-found: error
          retention-days: 30
